<!doctype html>
<html lang="en" data-theme="{{.Theme}}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Atria - Personal Mind Palace</title>
        <link rel="stylesheet" href="/static/water.css" />
        <link rel="stylesheet" href="/static/style.css" />
        <script src="/static/htmx.min.js"></script>

        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
            media="(prefers-color-scheme: dark)"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
            media="(prefers-color-scheme: light)"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

        <script>
            MathJax = {
                tex: {
                    inlineMath: [
                        ["$", "$"],
                        ["\\(", "\\)"],
                    ],
                },
            };
        </script>
        <script
            id="MathJax-script"
            async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
        ></script>
    </head>
    <body>
        <div id="mobile-header">
            <h3
                style="
                    margin: 0;
                    font-size: 1.2rem;
                    color: var(--accent);
                    letter-spacing: 2px;
                "
            >
                <span id="dynamic-header-title">ATRIA</span>
            </h3>
            <button id="menu-toggle">
                <svg class="icon" viewBox="0 0 24 24">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>

        <aside id="sidebar">
            <nav style="display: flex; flex-direction: column; width: 100%">
                <a
                    href="/"
                    hx-get="/"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link active"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                        ></path>
                        <polyline
                            points="9 22 9 12 15 12 15 22"
                        ></polyline></svg
                ></a>
                <a
                    href="/rss"
                    hx-get="/rss"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <path d="M4 11a9 9 0 0 1 9 9"></path>
                        <path d="M4 4a16 16 0 0 1 16 16"></path>
                        <circle cx="5" cy="19" r="1"></circle></svg
                ></a>
                <a
                    href="/read"
                    hx-get="/read"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"
                        ></path></svg
                ></a>
                <a
                    href="/notes"
                    hx-get="/notes"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                        ></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line></svg
                ></a>
                <a
                    href="/tables"
                    hx-get="/tables"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <rect
                            x="3"
                            y="3"
                            width="18"
                            height="18"
                            rx="2"
                            ry="2"
                        ></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="3" y1="15" x2="21" y2="15"></line>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                        <line x1="15" y1="3" x2="15" y2="21"></line></svg
                ></a>
            </nav>
            <div style="display: flex; flex-direction: column; width: 100%">
                <a
                    href="/settings"
                    hx-get="/settings"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                        ></path></svg
                ></a>
                <a
                    href="/profile"
                    hx-get="/profile"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"
                        ></path>
                        <circle cx="12" cy="7" r="4"></circle></svg
                ></a>
            </div>
        </aside>

        <main id="main-content">{{template "content" .}}</main>

        <script>
            const sidebar = document.getElementById("sidebar");
            document
                .getElementById("menu-toggle")
                .addEventListener("click", () =>
                    sidebar.classList.toggle("open"),
                );

            document.body.addEventListener("htmx:afterSettle", function () {
                const currentPath = window.location.pathname;

                document.querySelectorAll(".nav-link").forEach((link) => {
                    link.classList.remove("active");
                    const href = link.getAttribute("href");

                    if (
                        href === currentPath ||
                        (href !== "/" && currentPath.startsWith(href))
                    ) {
                        link.classList.add("active");
                    }
                });

                if (window.innerWidth <= 768) sidebar.classList.remove("open");
            });

            document.body.dispatchEvent(new Event("htmx:afterSettle"));

            document.body.addEventListener("htmx:afterSettle", function () {
                const title = document.querySelector(
                    "#main-content [data-mobile-title]",
                );
                const headerTitle = document.getElementById(
                    "dynamic-header-title",
                );

                if (headerTitle) {
                    headerTitle.innerText = title
                        ? title.getAttribute("data-mobile-title")
                        : "ATRIA";
                }
            });

            document.body.addEventListener(
                "htmx:responseError",
                function (evt) {
                    const errorMsg =
                        evt.detail.xhr.responseText || "Neznámá chyba serveru";

                    alert("❌ Oops, něco se pokazilo:\n\n" + errorMsg);

                    const el = evt.detail.elt;
                    if (el.tagName === "BUTTON") {
                        el.innerText = "Error (Zkusit znovu)";
                    }
                },
            );

            document.body.addEventListener("click", function (evt) {
                const flash = evt.target.closest("[data-flash-close]");
                if (!flash) return;

                const container = flash.closest(".flash-message");
                if (container) {
                    container.remove();
                }
            });
        </script>
        <script type="module">
            import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
            mermaid.initialize({ startOnLoad: false, theme: "neutral" });

            function initPlugins() {
                // 1. Zvýraznění syntaxe kódu
                if (typeof hljs !== "undefined") {
                    document
                        .querySelectorAll("pre code:not(.language-mermaid)")
                        .forEach((el) => {
                            if (!el.dataset.highlighted) {
                                hljs.highlightElement(el);
                            }
                        });
                }

                // 2. Vykreslení matematiky (MathJax)
                if (typeof MathJax !== "undefined" && MathJax.typesetPromise) {
                    MathJax.typesetPromise();
                }

                // 3. Vykreslení Mermaid grafů
                const unrenderedMermaids = [];
                document
                    .querySelectorAll("code.language-mermaid")
                    .forEach((block) => {
                        const pre = block.parentElement;
                        // Ochrana, abychom nezpracovávali jeden graf dvakrát
                        if (!pre.hasAttribute("data-mermaid-processed")) {
                            pre.classList.add("mermaid");
                            pre.setAttribute("data-mermaid-processed", "true");
                            pre.textContent = block.textContent; // Přepis na čistý text pro Mermaid
                            unrenderedMermaids.push(pre);
                        }
                    });

                // Spustíme Mermaid pouze nad těmi uzly, které ještě nebyly vykresleny
                if (unrenderedMermaids.length > 0) {
                    try {
                        mermaid.run({ nodes: unrenderedMermaids });
                    } catch (e) {
                        console.warn("Mermaid error:", e);
                    }
                }
            }

            // Spustíme okamžitě pro první načtení stránky přes tvrdé URL
            // (modul garantuje, že v tento moment je už DOM stránky hotový)
            initPlugins();

            // A navěsíme posluchače na HTMX pro všechna další "měkká" načtení (prokliky v menu)
            document.body.addEventListener("htmx:afterSettle", initPlugins);
        </script>
    </body>
</html>
