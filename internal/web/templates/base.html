<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Atria - Personal Mind Palace</title>
        <link rel="stylesheet" href="/static/water.css" />
        <link rel="stylesheet" href="/static/style.css" />
        <script src="/static/htmx.min.js"></script>

        <style>
            /* --- Dynamick variables (Light theme as default) --- */
            :root {
                --accent: #2563eb;
                --accent-hover: #1d4ed8;
                --bg-color: #ffffff;
                --sidebar-bg: #f8f9fa;
                --pane-bg: #f1f3f5;
                --border-color: #e2e8f0;
                --text-main: #334155;
                --text-heading: #0f172a;
                --text-muted: #64748b;
            }

            /* --- Dark theme (activate automaticaly by OS settings) --- */
            @media (prefers-color-scheme: dark) {
                :root {
                    --accent: #3b82f6;
                    --accent-hover: #60a5fa;
                    --bg-color: #0d1117;
                    --sidebar-bg: #111518;
                    --pane-bg: #15181c;
                    --border-color: #2a2e33;
                    --text-main: #cbd5e1;
                    --text-heading: #f8fafc;
                    --text-muted: #64748b;
                }
            }

            body {
                display: flex;
                height: 100vh;
                margin: 0;
                padding: 0;
                max-width: 100%;
                overflow: hidden;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
            }

            a {
                color: var(--accent);
                text-decoration: none;
                cursor: pointer;
            }
            a:hover {
                color: var(--accent-hover);
                text-decoration: underline;
            }
            p,
            ul,
            ol,
            td,
            blockquote {
                color: var(--text-main);
            }
            h1,
            h2,
            h3,
            h4,
            strong {
                color: var(--text-heading);
            }

            button,
            a.button-link {
                background-color: var(--accent);
                color: #fff;
                border: 1px solid transparent;
                cursor: pointer;
                padding: 8px 16px;
                border-radius: 4px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 38px;
                line-height: 1.2;
                box-sizing: border-box;
                text-decoration: none;
                font: inherit;
            }
            button:hover,
            a.button-link:hover {
                background-color: var(--accent-hover);
                text-decoration: none;
            }
            button.outline,
            a.button-link.outline {
                background-color: transparent;
                border: 1px solid var(--border-color);
                color: var(--text-main);
            }
            button.outline:hover,
            a.button-link.outline:hover {
                border-color: var(--accent);
                color: var(--accent);
                background-color: transparent;
            }

            .icon {
                width: 22px;
                height: 22px;
                stroke: currentColor;
                stroke-width: 2;
                stroke-linecap: round;
                stroke-linejoin: round;
                fill: none;
            }
            .icon-sm {
                width: 16px;
                height: 16px;
                pointer-events: none;
            }

            .page-header-row {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
            }
            .action-row {
                display: flex;
                gap: 10px;
                align-items: center;
                flex-wrap: wrap;
            }
            .pagination-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 30px;
                padding-top: 20px;
                flex-wrap: wrap;
                gap: 15px;
            }
            .page-empty-hint {
                color: var(--text-muted);
                font-size: 0.95rem;
            }
            .flash-message {
                padding: 12px 16px;
                border-radius: 6px;
                margin-bottom: 20px;
                border: 1px solid var(--border-color);
                font-size: 0.95rem;
            }
            .flash-message.success {
                background: rgba(16, 185, 129, 0.12);
                border-color: rgba(16, 185, 129, 0.35);
                color: #059669;
            }
            .flash-message.error {
                background: rgba(239, 68, 68, 0.12);
                border-color: rgba(239, 68, 68, 0.35);
                color: #dc2626;
            }
            .form-input {
                width: 100%;
                margin: 0;
                background: var(--pane-bg);
                color: var(--text-main);
                border: 1px solid var(--border-color);
                padding: 10px;
                border-radius: 4px;
                box-sizing: border-box;
            }
            .form-input.compact {
                width: auto;
            }
            .hide-mobile {
                display: initial;
            }

            /* Layout */
            #mobile-header {
                display: none;
            }
            #sidebar {
                width: 60px;
                background: var(--sidebar-bg);
                border-right: 1px solid var(--border-color);
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                padding: 20px 0;
                z-index: 100;
                flex-shrink: 0;
            }
            #sidebar a {
                color: var(--text-muted);
                margin: 15px 0;
                display: flex;
                justify-content: center;
                width: 100%;
                transition: all 0.2s;
            }
            #sidebar a:hover,
            #sidebar a.htmx-request,
            #sidebar a.active {
                color: var(--accent);
            }

            main {
                flex-grow: 1;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* Obaly a komponenty */
            .centered-view {
                max-width: 800px;
                margin: 0 auto;
                padding: 40px;
                width: 100%;
                box-sizing: border-box;
                overflow-y: auto;
                height: 100%;
            }
            h2 {
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 10px;
                margin-top: 0;
            }

            .list-item {
                border-bottom: 1px solid var(--border-color);
                padding: 15px 0;
                display: flex;
                justify-content: space-between;
                align-items: baseline;
            }
            .list-item h4 {
                margin: 0 0 5px 0;
            }
            .tag {
                background: rgba(59, 130, 246, 0.1);
                color: var(--accent);
                padding: 3px 8px;
                border-radius: 4px;
                border: 1px solid rgba(59, 130, 246, 0.3);
                font-size: 0.8rem;
                margin-right: 5px;
            }
            pre {
                background: var(--sidebar-bg);
                padding: 15px;
                border-radius: 6px;
                border: 1px solid var(--border-color);
                overflow-x: auto;
                color: var(--text-main);
            }

            /* Mobil */
            @media (max-width: 768px) {
                #mobile-header {
                    display: flex;
                    background: var(--sidebar-bg);
                    padding: 15px 20px;
                    border-bottom: 1px solid var(--border-color);
                    position: fixed;
                    width: 100%;
                    top: 0;
                    justify-content: space-between;
                    align-items: center;
                    box-sizing: border-box;
                    z-index: 1000;
                }
                #menu-toggle {
                    background: transparent;
                    color: var(--text-heading);
                    padding: 0;
                    display: flex;
                }
                main {
                    padding-top: 60px;
                    height: calc(100vh - 60px);
                }
                #sidebar {
                    position: fixed;
                    left: 0;
                    top: 60px;
                    height: calc(100vh - 60px);
                    transform: translateX(-100%);
                    transition: transform 0.3s ease;
                }
                #sidebar.open {
                    transform: translateX(0);
                }
                .centered-view {
                    padding: 20px;
                }
                .page-header-row {
                    align-items: center;
                }
                .pagination-bar {
                    align-items: flex-start;
                }
                .hide-mobile {
                    display: none !important;
                }
                button,
                a.button-link {
                    min-height: 42px;
                    padding: 10px 18px;
                }
            }
        </style>
    </head>
    <body>
        <div id="mobile-header">
            <h3
                style="
                    margin: 0;
                    font-size: 1.2rem;
                    color: var(--accent);
                    letter-spacing: 2px;
                "
            >
                <span id="dynamic-header-title">ATRIA</span>
            </h3>
            <button id="menu-toggle">
                <svg class="icon" viewBox="0 0 24 24">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>

        <aside id="sidebar">
            <nav style="display: flex; flex-direction: column; width: 100%">
                <a
                    href="/"
                    hx-get="/"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link active"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
                        ></path>
                        <polyline
                            points="9 22 9 12 15 12 15 22"
                        ></polyline></svg
                ></a>
                <a
                    href="/rss"
                    hx-get="/rss"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <path d="M4 11a9 9 0 0 1 9 9"></path>
                        <path d="M4 4a16 16 0 0 1 16 16"></path>
                        <circle cx="5" cy="19" r="1"></circle></svg
                ></a>
                <a
                    href="/read"
                    hx-get="/read"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"
                        ></path></svg
                ></a>
                <a
                    href="/notes"
                    hx-get="/notes"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                        ></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line></svg
                ></a>
                <a
                    href="/tables"
                    hx-get="/tables"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <rect
                            x="3"
                            y="3"
                            width="18"
                            height="18"
                            rx="2"
                            ry="2"
                        ></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="3" y1="15" x2="21" y2="15"></line>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                        <line x1="15" y1="3" x2="15" y2="21"></line></svg
                ></a>
            </nav>
            <div style="display: flex; flex-direction: column; width: 100%">
                <a
                    href="/settings"
                    hx-get="/settings"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                        ></path></svg
                ></a>
                <a
                    href="/profile"
                    hx-get="/profile"
                    hx-target="#main-content"
                    hx-push-url="true"
                    class="nav-link"
                    ><svg class="icon" viewBox="0 0 24 24">
                        <path
                            d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"
                        ></path>
                        <circle cx="12" cy="7" r="4"></circle></svg
                ></a>
            </div>
        </aside>

        <main id="main-content">{{template "content" .}}</main>

        <script>
            const sidebar = document.getElementById("sidebar");
            document
                .getElementById("menu-toggle")
                .addEventListener("click", () =>
                    sidebar.classList.toggle("open"),
                );

            document.body.addEventListener("htmx:afterSettle", function () {
                const currentPath = window.location.pathname;

                document.querySelectorAll(".nav-link").forEach((link) => {
                    link.classList.remove("active");
                    const href = link.getAttribute("href");

                    if (
                        href === currentPath ||
                        (href !== "/" && currentPath.startsWith(href))
                    ) {
                        link.classList.add("active");
                    }
                });

                if (window.innerWidth <= 768) sidebar.classList.remove("open");
            });

            document.body.dispatchEvent(new Event("htmx:afterSettle"));

            document.body.addEventListener("htmx:afterSettle", function () {
                const title = document.querySelector(
                    "#main-content [data-mobile-title]",
                );
                const headerTitle = document.getElementById(
                    "dynamic-header-title",
                );

                if (headerTitle) {
                    headerTitle.innerText = title
                        ? title.getAttribute("data-mobile-title")
                        : "ATRIA";
                }
            });

            document.body.addEventListener(
                "htmx:responseError",
                function (evt) {
                    const errorMsg =
                        evt.detail.xhr.responseText || "Neznámá chyba serveru";

                    alert("❌ Oops, něco se pokazilo:\n\n" + errorMsg);

                    const el = evt.detail.elt;
                    if (el.tagName === "BUTTON") {
                        el.innerText = "Error (Zkusit znovu)";
                    }
                },
            );

            document.body.addEventListener("click", function (evt) {
                const flash = evt.target.closest("[data-flash-close]");
                if (!flash) return;

                const container = flash.closest(".flash-message");
                if (container) {
                    container.remove();
                }
            });
        </script>
    </body>
</html>
