{{define "content"}}
<div class="centered-view" data-mobile-title="ATRIA: Attachments">
    <h2>Správa příloh</h2>

    <table style="width: 100%; border-collapse: collapse; margin-top: 20px">
        <thead>
            <tr style="border-bottom: 2px solid var(--border)">
                <th style="text-align: left; padding: 10px">Název</th>
                <th style="text-align: left; padding: 10px">Typ</th>
                <th style="text-align: left; padding: 10px">Velikost</th>
                <th style="text-align: left; padding: 10px">Nahráno</th>
            </tr>
        </thead>
        <tbody>
            {{range .Attachments}}
            <tr style="border-bottom: 1px solid var(--border)">
                <td style="padding: 10px"><strong>{{.Filename}}</strong></td>
                <td style="padding: 10px"><small>{{.MimeType}}</small></td>
                <td style="padding: 10px">{{div .SizeBytes 1024}} KB</td>
                <td style="padding: 10px; color: var(--text-muted)">
                    {{formatDate .CreatedAt}}
                </td>
            </tr>
            {{else}}
            <tr>
                <td colspan="4" style="padding: 20px; text-align: center">
                    Žádné přílohy nebyly nahrány.
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
