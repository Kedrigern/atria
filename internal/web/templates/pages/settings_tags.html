{{define "content"}}
<div class="centered-view wide" data-mobile-title="ATRIA: Tags">
    <h2 class="hide-mobile">Settings</h2>

    {{template "flash_message" .}} {{template "settings_nav" "tags"}}
    <h3>Tag Manager</h3>

    <form
        method="post"
        action="/api/settings/tags/add"
        style="display: flex; gap: 10px; margin-bottom: 30px"
        hx-post="/api/settings/tags/add"
    >
        <input type="hidden" name="_csrf" value="{{.CSRFToken}}" />
        <input
            type="text"
            name="name"
            placeholder="Název nového tagu..."
            required
            maxlength="20"
        />
        <button type="submit">Vytvořit Tag</button>
    </form>

    <details
        style="
            margin-bottom: 30px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            background: var(--background);
        "
    >
        <summary style="cursor: pointer; font-weight: bold">
            🔗 Přiřadit Tag k Entitě
        </summary>
        <form
            method="post"
            action="/api/settings/tags/attach"
            style="margin-top: 15px; display: grid; gap: 12px; max-width: 480px"
        >
            <input type="hidden" name="_csrf" value="{{.CSRFToken}}" />

            <div>
                <label
                    style="
                        display: block;
                        font-weight: bold;
                        margin-bottom: 4px;
                    "
                    >Entita (Název, UUID, nebo Short ID)</label
                >
                <input
                    type="text"
                    name="entity_identifier"
                    required
                    placeholder="např. Solar Setup nebo 8e6a1f..."
                    style="width: 100%"
                />
            </div>

            <div>
                <label
                    style="
                        display: block;
                        font-weight: bold;
                        margin-bottom: 4px;
                    "
                    >Vyberte Tag</label
                >
                <select name="tag_name" required style="width: 100%">
                    <option value="" disabled selected>
                        Zvolte tag ze seznamu...
                    </option>
                    {{range .Tags}}
                    <option value="{{.Name}}">#{{.Name}}</option>
                    {{end}}
                </select>
            </div>

            <button type="submit" style="width: fit-content">
                Připojit Tag
            </button>
        </form>
    </details>

    <div style="display: flex; flex-wrap: wrap; gap: 15px">
        {{range .Tags}}
        <div
            style="
                border: 1px solid var(--border);
                padding: 15px;
                border-radius: 6px;
                background: var(--background-alt);
                min-width: 120px;
                text-align: center;
            "
        >
            <a
                href="/settings/tags/{{.Name}}"
                style="font-weight: bold; font-size: 1.1rem"
                >#{{.Name}}</a
            >
            {{if .IsSystem}}<br /><small style="color: var(--text-muted)"
                >System</small
            >{{end}}
        </div>
        {{else}}
        <p>Zatím nemáte žádné tagy.</p>
        {{end}}
    </div>
</div>
{{end}}
