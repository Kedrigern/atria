{{define "content"}}
<div class="centered-view wide" data-mobile-title="ATRIA: Tags">
    {{template "settings_header" .}}
    <h3>Tag Manager</h3>

    <form
        method="post"
        action="/api/tags/create"
        class="flex-row mb-3"
        hx-post="/api/tags/create"
    >
        <input type="hidden" name="_csrf" value="{{.CSRFToken}}" />
        <input
            type="text"
            name="name"
            placeholder="Název nového tagu..."
            class="form-control"
            required
            maxlength="20"
        />
        <button type="submit">Vytvořit Tag</button>
    </form>

    <details
        class="mb-3"
        style="
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            background: var(--background);
        "
    >
        <summary style="cursor: pointer; font-weight: bold">
            🔗 Přiřadit Tag k Entitě
        </summary>
        <form
            method="post"
            action="/api/tags/attach"
            style="margin-top: 15px; display: grid; gap: 12px; max-width: 480px"
        >
            <input type="hidden" name="_csrf" value="{{.CSRFToken}}" />

            <div class="form-group">
                <label>Entita (Název, UUID, nebo Short ID)</label>
                <input
                    type="text"
                    name="entity_identifier"
                    required
                    placeholder="např. Solar Setup nebo 8e6a1f..."
                    class="form-control"
                />
            </div>

            <div class="form-group">
                <label>Vyberte Tag</label>
                <select name="tag_name" required class="form-control">
                    <option value="" disabled selected>
                        Zvolte tag ze seznamu...
                    </option>
                    {{range .Tags}}
                    <option value="{{.Name}}">#{{.Name}}</option>
                    {{end}}
                </select>
            </div>

            <button type="submit" style="width: fit-content">
                Připojit Tag
            </button>
        </form>
    </details>

    <div class="flex-row flex-wrap" style="gap: 15px">
        {{range .Tags}}
        <div
            style="
                border: 1px solid var(--border);
                padding: 15px;
                border-radius: 6px;
                background: var(--background-alt);
                min-width: 120px;
                text-align: center;
            "
        >
            <a
                href="/settings/tags/{{.Name}}"
                style="font-weight: bold; font-size: 1.1rem"
                >#{{.Name}}</a
            >
            {{if .IsSystem}}<br /><small style="color: var(--text-muted)"
                >System</small
            >{{end}}
        </div>
        {{else}}
        <p>Zatím nemáte žádné tagy.</p>
        {{end}}
    </div>
</div>
{{end}}
