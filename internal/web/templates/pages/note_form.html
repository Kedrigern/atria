{{define "content"}}
<div class="centered-view">
    <h1
        style="
            margin-top: 0;
            color: var(--text-heading);
            font-size: 2.2rem;
            margin-bottom: 30px;
        "
    >
        Nová poznámka
    </h1>

    <form hx-post="/api/notes/create" hx-target="#main-content">
        <div style="margin-bottom: 15px">
            <label
                style="
                    display: block;
                    margin-bottom: 5px;
                    color: var(--text-muted);
                "
                >Název</label
            >
            <input
                type="text"
                name="title"
                placeholder="Např. Plánování dovolené..."
                style="width: 100%"
                required
                autofocus
            />
        </div>

        <div style="margin-bottom: 15px">
            <label
                style="
                    display: block;
                    margin-bottom: 5px;
                    color: var(--text-muted);
                "
                >Cesta (např. /projekty/atria)</label
            >
            <input
                type="text"
                name="path"
                value="/"
                placeholder="/"
                style="width: 100%"
            />
        </div>

        <div style="margin-bottom: 25px">
            <label
                style="
                    display: block;
                    margin-bottom: 5px;
                    color: var(--text-muted);
                "
                >Obsah (Markdown)</label
            >
            <textarea
                name="content"
                style="
                    width: 100%;
                    height: 300px;
                    font-family: monospace;
                    font-size: 1rem;
                    line-height: 1.5;
                "
            ></textarea>
        </div>

        <div style="display: flex; gap: 15px; align-items: center">
            <button type="submit" style="margin: 0; padding: 8px 20px">
                Vytvořit poznámku
            </button>
            <button
                type="button"
                hx-get="/notes"
                hx-target="#main-content"
                hx-push-url="true"
                class="outline"
                style="margin: 0; padding: 8px 20px"
            >
                Zrušit
            </button>
        </div>
    </form>
</div>
{{end}}
