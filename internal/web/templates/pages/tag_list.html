{{define "content"}}
<div class="centered-view" data-mobile-title="ATRIA: Tags">
    <h2 class="hide-mobile">Settings</h2>

    {{if .Flash}}
    <div class="flash-message {{.Flash.Type}}">
        <div class="action-row" style="justify-content: space-between">
            <span>{{.Flash.Message}}</span>
            <button
                type="button"
                class="outline"
                data-flash-close
                style="min-height: auto; padding: 4px 8px"
            >
                ×
            </button>
        </div>
    </div>
    {{end}}

    <div
        style="
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
            padding-bottom: 10px;
        "
    >
        <a href="/settings" style="color: var(--text-muted); font-weight: bold"
            >General</a
        >
        <a
            href="/settings/users"
            style="color: var(--text-muted); font-weight: bold"
            >Users</a
        >
        <a
            href="/settings/rss"
            style="color: var(--text-muted); font-weight: bold"
            >RSS</a
        >
        <a
            href="/settings/tags"
            style="
                font-weight: bold;
                color: var(--links);
                border-bottom: 2px solid var(--links);
                padding-bottom: 10px;
                margin-bottom: -11px;
            "
            >Tags</a
        >
        <a
            href="/settings/attachments"
            style="color: var(--text-muted); font-weight: bold"
            >Attachments</a
        >
    </div>

    <h3>Tag Manager</h3>

    <form
        method="post"
        action="/api/settings/tags/add"
        style="display: flex; gap: 10px; margin-bottom: 30px"
        hx-post="/api/settings/tags/add"
    >
        <input type="hidden" name="_csrf" value="{{.CSRFToken}}" />
        <input
            type="text"
            name="name"
            placeholder="Název nového tagu..."
            required
            maxlength="20"
        />
        <button type="submit">Vytvořit Tag</button>
    </form>

    <div style="display: flex; flex-wrap: wrap; gap: 15px">
        {{range .Tags}}
        <div
            style="
                border: 1px solid var(--border);
                padding: 15px;
                border-radius: 6px;
                background: var(--background-alt);
                min-width: 120px;
                text-align: center;
            "
        >
            <a
                href="/settings/tags/{{.Name}}"
                style="font-weight: bold; font-size: 1.1rem"
                >#{{.Name}}</a
            >
            {{if .IsSystem}}<br /><small style="color: var(--text-muted)"
                >System</small
            >{{end}}
        </div>
        {{else}}
        <p>Zatím nemáte žádné tagy.</p>
        {{end}}
    </div>
</div>
{{end}}
