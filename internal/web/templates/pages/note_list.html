{{define "content"}}
<div class="centered-view" data-mobile-title="ATRIA: Notes">
    <div class="page-header-row flex-between flex-wrap mb-3" style="gap: 15px">
        <h2 style="margin: 0">Knowledge Base</h2>

        <div class="flex-row">
            <button
                type="button"
                class="outline btn-sm"
                title="Rozbalit vše"
                onclick="
                    document
                        .querySelectorAll('.note-tree details')
                        .forEach((d) => (d.open = true))
                "
            >
                <span class="icon-sm icon-expand"></span>
            </button>

            <button
                type="button"
                class="outline btn-sm"
                title="Sbalit vše"
                onclick="
                    document
                        .querySelectorAll('.note-tree details')
                        .forEach((d) => (d.open = false))
                "
            >
                <span class="icon-sm icon-collapse"></span>
            </button>

            <div class="toolbar-sep"></div>

            <button
                hx-get="/notes/new"
                hx-target="#main-content"
                hx-push-url="true"
                class="btn btn-primary btn-sm"
            >
                + New Note
            </button>
        </div>
    </div>

    <div class="note-tree">{{template "tree_node" .TreeRoot}}</div>
</div>
{{end}}
