{{define "content"}}
<div class="centered-view" data-mobile-title="ATRIA: Settings">
    <h2 class="hide-mobile">Settings</h2>

    <div
        style="
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
            padding-bottom: 10px;
        "
    >
        <a
            href="/settings"
            style="
                font-weight: bold;
                color: var(--links);
                border-bottom: 2px solid var(--links);
                padding-bottom: 10px;
                margin-bottom: -11px;
            "
            >General</a
        >
        <a href="#" style="color: var(--text-muted); font-weight: bold"
            >Users</a
        >
        <a href="#" style="color: var(--text-muted); font-weight: bold">RSS</a>
        <a href="#" style="color: var(--text-muted); font-weight: bold"
            >Sync (Zensical)</a
        >
    </div>

    <div style="max-width: 500px">
        <div style="margin-bottom: 25px">
            <label><strong>Instance Name</strong></label>
            <input type="text" value="My Mind Palace" />
            <small style="color: var(--text-muted)"
                >This name will be displayed in the browser tab and mobile
                header.</small
            >
        </div>

        <div style="margin-bottom: 25px">
            <label><strong>Default Visibility</strong></label>
            <select>
                <option selected>Private (Only me)</option>
                <option>Users (Any instance user)</option>
                <option>Public (Visible to the web)</option>
            </select>
            <small style="color: var(--text-muted)"
                >Initial visibility for newly created notes and articles.</small
            >
        </div>

        <div
            style="
                margin-bottom: 25px;
                padding: 15px;
                border: 1px solid var(--border);
                border-radius: 6px;
                background: var(--background);
            "
        >
            <label
                style="
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    cursor: pointer;
                "
            >
                <input type="checkbox" checked style="width: auto; margin: 0" />
                <strong>Auto-generate WARC</strong>
            </label>
            <p
                style="
                    margin: 5px 0 0 25px;
                    font-size: 0.85rem;
                    color: var(--text-muted);
                "
            >
                Always save a full web archive for every Read-it-Later item.
                (Requires more disk space).
            </p>
        </div>

        <button style="width: 100%; font-weight: bold">Save All Changes</button>
    </div>
</div>
{{end}}
