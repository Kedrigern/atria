{{define "content"}}
<div class="centered-view wide" data-mobile-title="ATRIA: RSS Feeds">
    {{template "settings_header" .}}

    <div class="page-header-row mb-1">
        <h3>Subscribed Feeds</h3>
        <form method="post" action="/api/rss/fetch">
            <input type="hidden" name="_csrf" value="{{.CSRFToken}}" />
            <button class="outline" type="submit">⟳ Fetch Now</button>
        </form>
    </div>

    <form
        method="post"
        action="/api/rss/add"
        class="flex-row flex-wrap mb-3"
        style="align-items: flex-start"
    >
        <input type="hidden" name="_csrf" value="{{.CSRFToken}}" />
        <input
            type="url"
            name="url"
            placeholder="https://... (URL feedu)"
            class="form-control"
            required
        />
        <input
            type="text"
            name="title"
            placeholder="Název (volitelné)"
            class="form-control"
        />
        <button type="submit" style="white-space: nowrap">Add Feed</button>
    </form>

    <table style="width: 100%; border-collapse: collapse; margin-top: 20px">
        <thead>
            <tr>
                <th
                    style="
                        border-bottom: 1px solid var(--border-color);
                        padding: 10px;
                        text-align: left;
                    "
                >
                    Title
                </th>
                <th
                    style="
                        border-bottom: 1px solid var(--border-color);
                        padding: 10px;
                        text-align: left;
                    "
                >
                    URL
                </th>
                <th
                    style="
                        border-bottom: 1px solid var(--border-color);
                        padding: 10px;
                        text-align: left;
                    "
                >
                    Last Fetch
                </th>
                <th
                    style="
                        border-bottom: 1px solid var(--border-color);
                        padding: 10px;
                        text-align: right;
                    "
                >
                    Actions
                </th>
            </tr>
        </thead>
        <tbody>
            {{range .Feeds}}
            <tr>
                <td
                    style="
                        border-bottom: 1px solid var(--border-color);
                        padding: 10px;
                    "
                >
                    <strong><a href="/rss/{{.ID}}">{{.Title}}</a></strong>
                </td>
                <td
                    style="
                        border-bottom: 1px solid var(--border-color);
                        padding: 10px;
                        color: var(--text-muted);
                        font-size: 0.9rem;
                    "
                >
                    <a
                        href="{{.FeedURL}}"
                        target="_blank"
                        style="color: inherit; text-decoration: none"
                        >{{.FeedURL}}</a
                    >
                </td>
                <td
                    style="
                        border-bottom: 1px solid var(--border-color);
                        padding: 10px;
                        color: var(--text-muted);
                        font-size: 0.9rem;
                    "
                >
                    {{if .LastFetchedAt}}{{formatDate
                    .LastFetchedAt}}{{else}}Never{{end}}
                </td>
                <td
                    style="
                        border-bottom: 1px solid var(--border-color);
                        padding: 10px;
                        text-align: right;
                    "
                >
                    <div class="action-row" style="justify-content: flex-end">
                        <button
                            type="button"
                            hx-post="/api/entity/{{.ID}}/rename"
                            hx-prompt="Zadejte nový název pro tento RSS Feed:"
                            class="outline btn-sm"
                            title="Přejmenovat zdroj"
                        >
                            ✏️
                        </button>

                        <form
                            method="post"
                            action="/api/rss/{{.ID}}/fetch"
                            style="margin: 0; display: inline"
                        >
                            <input
                                type="hidden"
                                name="_csrf"
                                value="{{$.CSRFToken}}"
                            />
                            <button
                                type="submit"
                                class="outline btn-sm"
                                title="Synchronizovat tento feed"
                            >
                                <span class="icon-sm icon-refresh"></span>
                            </button>
                        </form>

                        <form
                            method="post"
                            action="/api/rss/{{.ID}}/delete"
                            style="margin: 0; display: inline"
                        >
                            <input
                                type="hidden"
                                name="_csrf"
                                value="{{$.CSRFToken}}"
                            />
                            <button
                                type="submit"
                                class="outline btn-sm btn-danger"
                                title="Smazat feed"
                            >
                                <span class="icon-sm icon-trash"></span>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            {{else}} {{end}}
        </tbody>
    </table>
</div>
{{end}}
