{{define "content"}}

<div class="centered-view" data-mobile-title="ATRIA: Profile">
    <h2 class="hide-mobile">My Profile</h2>

    <div
        style="
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 30px;
        "
    >
        <div
            style="
                width: 80px;
                height: 80px;
                background: var(--accent);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 2rem;
                color: #fff;
            "
        >
            M
        </div>
        <div>
            <h3 style="margin: 0">@martin</h3>
            <p style="margin: 0; color: var(--text-muted)">Instance Admin</p>
        </div>
    </div>

    <h4>API Keys (CLI Access)</h4>
    <p style="font-size: 0.9rem; color: var(--text-muted)">
        These keys allow external tools (like the Atria CLI) to access your Mind
        Palace.
    </p>

    <div
        style="
            background: var(--pane-bg);
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        "
    >
        <code style="color: var(--text-main)">atr_8f92jKls92...</code>
        <button class="outline" style="padding: 5px 10px">Revoke</button>
    </div>

    <button>+ Generate New Token</button>
</div>
{{end}}
