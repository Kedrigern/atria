{{define "content"}}
<div
    style="
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
    "
>
    <div
        class="card shadow"
        style="width: 100%; max-width: 400px; padding: 30px"
    >
        <div style="text-align: center; margin-bottom: 30px">
            <h1 style="margin-bottom: 10px">Atria</h1>
            <p class="text-muted">Přihlášení do vašeho digitálního archivu</p>
        </div>

        {{if .Flash}}
        <div style="padding: 12px; margin-bottom: 20px; border-radius: 4px; text-align: center; font-weight: bold;
                    {{if eq .Flash.Type "error"}}background: #ffebee; color: #c62828; border: 1px solid #ef9a9a;
                    {{else}}background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7;{{end}}">
            {{.Flash.Message}}
        </div>
        {{end}}

        <form action="/login" method="POST">
            <div style="margin-bottom: 20px">
                <label
                    for="email"
                    style="
                        display: block;
                        font-weight: bold;
                        margin-bottom: 8px;
                    "
                    >E-mailová adresa</label
                >
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    autofocus
                    placeholder="vass@email.cz"
                    style="
                        width: 100%;
                        padding: 12px;
                        border: 1px solid var(--border);
                        border-radius: 4px;
                        background: var(--background);
                    "
                />
            </div>

            <div style="margin-bottom: 25px">
                <label
                    for="password"
                    style="
                        display: block;
                        font-weight: bold;
                        margin-bottom: 8px;
                    "
                    >Heslo</label
                >
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder="••••••••"
                    style="
                        width: 100%;
                        padding: 12px;
                        border: 1px solid var(--border);
                        border-radius: 4px;
                        background: var(--background);
                    "
                />
            </div>

            <button
                type="submit"
                class="button"
                style="width: 100%; padding: 12px; font-size: 1.1rem"
            >
                Přihlásit se
            </button>
        </form>

        <div
            style="
                margin-top: 30px;
                padding-top: 20px;
                border-top: 1px solid var(--border);
                text-align: center;
                font-size: 0.9rem;
            "
        >
            <p class="text-muted">
                Používáte SSO? Pokud k serveru přistupujete přes schválenou
                proxy (Authelia), měli byste být přihlášeni automaticky.
            </p>
        </div>
    </div>
</div>
{{end}}
