{{define "content"}}
<div class="centered-view">
    <div class="doc-header" style="margin-bottom: 30px">
        <a
            href="/note"
            hx-get="/note"
            hx-target="#main-content"
            hx-push-url="true"
            class="toggle-btn"
            style="font-weight: bold"
        >
            ← Back to Inbox
        </a>
        <div class="doc-actions">
            <span class="tag">Folder: {{.Path}}</span>
        </div>
    </div>

    <h1 style="margin-top: 0; color: var(--text-heading)">{{.Title}}</h1>

    <div style="font-size: 1.1rem; line-height: 1.7; color: var(--text-main)">
        {{.Content}}
    </div>

    <div id="tag-container" style="margin-bottom: 20px">
        <div
            id="tag-list"
            style="display: inline-flex; flex-wrap: wrap; gap: 8px"
        >
            {{range .Tags}}
            <a href="/tags/{{.Name}}" class="tag">#{{.Name}}</a>
            {{end}}
        </div>

        <form
            hx-post="/api/entity/{{.ID}}/tags"
            hx-target="#tag-list"
            hx-swap="beforeend"
            style="display: inline-flex; margin-left: 10px"
            hx-on::after-request="if(event.detail.successful) this.reset()"
        >
            <input
                type="text"
                name="tag_name"
                placeholder="Přidat tag..."
                style="
                    width: 120px;
                    padding: 2px 8px;
                    margin: 0;
                    height: auto;
                    font-size: 0.85rem;
                "
                required
            />
            <button
                type="submit"
                class="outline"
                style="padding: 2px 8px; margin: 0; min-height: auto"
            >
                +
            </button>
        </form>
    </div>
</div>
{{end}}
