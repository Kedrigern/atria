{{define "content"}}
<div class="centered-view">
    <div class="doc-header" style="margin-bottom: 30px">
        <a
            href="/note"
            hx-get="/note"
            hx-target="#main-content"
            hx-push-url="true"
            class="toggle-btn"
            style="font-weight: bold"
        >
            ← Back to Inbox
        </a>
        <div class="doc-actions">
            <span class="tag">Folder: {{.Path}}</span>
        </div>
    </div>

    <h1 style="margin-top: 0; color: var(--text-heading)">{{.Title}}</h1>

    <div style="font-size: 1.1rem; line-height: 1.7; color: var(--text-main)">
        {{.Content}}
    </div>

    <div id="tag-container" style="margin-bottom: 20px">
        <div
            id="tag-list"
            style="display: inline-flex; flex-wrap: wrap; gap: 8px"
        >
            {{range .Tags}}
            <a href="/tags/{{.Name}}" class="tag">#{{.Name}}</a>
            {{end}}
        </div>

        <form
            hx-post="/api/entity/{{.ID}}/tags"
            hx-target="#tag-list"
            hx-swap="beforeend"
            style="display: inline-flex; margin-left: 10px"
            hx-on::after-request="if(event.detail.successful) this.reset()"
        >
            <input
                type="text"
                name="tag_name"
                placeholder="Přidat tag..."
                style="
                    width: 120px;
                    padding: 2px 8px;
                    margin: 0;
                    height: auto;
                    font-size: 0.85rem;
                "
                required
            />
            <button
                type="submit"
                class="outline"
                style="padding: 2px 8px; margin: 0; min-height: auto"
            >
                +
            </button>
        </form>
    </div>

    {{if .Attachments}}
    <div
        style="
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        "
    >
        <h4 style="margin-bottom: 15px">Přílohy</h4>
        <ul style="list-style: none; padding: 0">
            {{range .Attachments}}
            <li
                style="
                    margin-bottom: 8px;
                    display: flex;
                    align-items: center;
                    gap: 10px;
                "
            >
                <svg
                    class="icon-sm"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path
                        d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"
                    ></path>
                    <polyline points="13 2 13 9 20 9"></polyline>
                </svg>
                <a href="/data/attachments/{{.DiskPath}}" target="_blank"
                    >{{.Filename}}</a
                >
                <small style="color: var(--text-muted)"
                    >({{divide .SizeBytes 1024}} KB)</small
                >
            </li>
            {{end}}
        </ul>
    </div>
    {{end}}
</div>
{{end}}
