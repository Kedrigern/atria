{{define "content"}}
<div class="centered-view" data-mobile-title="ATRIA: Search">
    <div class="page-header-row mb-3">
        <h2 class="hide-mobile">Search</h2>
    </div>

    <div id="search-form" class="flex-row flex-wrap mb-3" style="align-items: flex-start;">
        <input
            id="search-input"
            type="search"
            name="q"
            value="{{.Query}}"
            placeholder="Search notes, articles, RSS…"
            class="form-control"
            style="flex: 1 1 300px;"
            autofocus
            hx-get="/search"
            hx-target="#search-results"
            hx-trigger="input delay:300ms, search"
            hx-include="#search-filter,#search-archived"
        />
        <select
            id="search-filter"
            name="in"
            class="form-control"
            style="flex: 0 0 auto;"
            hx-get="/search"
            hx-target="#search-results"
            hx-trigger="change"
            hx-include="#search-input,#search-archived"
        >
            <option value=""       {{if eq .Filter ""}}        selected{{end}}>All</option>
            <option value="notes"    {{if eq .Filter "notes"}}   selected{{end}}>Notes</option>
            <option value="articles" {{if eq .Filter "articles"}} selected{{end}}>Articles</option>
            <option value="rss"      {{if eq .Filter "rss"}}      selected{{end}}>RSS</option>
        </select>
        <label class="flex-row" style="gap: 6px; flex: 0 0 auto;">
            <input type="checkbox" id="search-archived" name="archived" value="1"
                {{if .IncludeArchived}}checked{{end}}
                hx-get="/search"
                hx-target="#search-results"
                hx-trigger="change"
                hx-include="#search-input,#search-filter"
            />
            Include archived
        </label>
    </div>

    <div id="search-results">
        <p style="color: var(--text-muted)">Enter a search term above to get started.</p>
    </div>
</div>
{{end}}
