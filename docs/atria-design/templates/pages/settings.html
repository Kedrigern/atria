{{define "content"}}
<div class="centered-view">
    <h2>Settings</h2>

    <div class="top-nav">
        <a href="/settings" class="active">General</a>
        <a href="#">Users</a>
        <a href="#">RSS</a>
        <a href="#">Sync (Zensical)</a>
    </div>

    <div style="max-width: 500px; margin-top: 20px">
        <div style="margin-bottom: 25px">
            <label
                style="
                    display: block;
                    margin-bottom: 8px;
                    font-weight: bold;
                    color: var(--text-heading);
                "
                >Instance Name</label
            >
            <input
                type="text"
                value="My Mind Palace"
                style="
                    width: 100%;
                    background: var(--pane-bg);
                    color: var(--text-main);
                    border: 1px solid var(--border-color);
                    padding: 10px;
                    border-radius: 4px;
                "
            />
            <small style="color: var(--text-muted)"
                >This name will be displayed in the browser tab and mobile
                header.</small
            >
        </div>

        <div style="margin-bottom: 25px">
            <label
                style="
                    display: block;
                    margin-bottom: 8px;
                    font-weight: bold;
                    color: var(--text-heading);
                "
                >Default Visibility</label
            >
            <select
                style="
                    width: 100%;
                    background: var(--pane-bg);
                    color: var(--text-main);
                    border: 1px solid var(--border-color);
                    padding: 10px;
                    border-radius: 4px;
                "
            >
                <option selected>Private (Only me)</option>
                <option>Users (Any instance user)</option>
                <option>Public (Visible to the web)</option>
            </select>
            <small style="color: var(--text-muted)"
                >Initial visibility for newly created notes and articles.</small
            >
        </div>

        <div
            style="
                margin-bottom: 25px;
                padding: 15px;
                border: 1px solid var(--border-color);
                border-radius: 6px;
                background: var(--pane-bg);
            "
        >
            <label
                style="
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    cursor: pointer;
                    color: var(--text-heading);
                "
            >
                <input type="checkbox" checked style="margin: 0" />
                <strong>Auto-generate WARC</strong>
            </label>
            <p
                style="
                    margin: 5px 0 0 25px;
                    font-size: 0.85rem;
                    color: var(--text-muted);
                "
            >
                Always save a full web archive for every Read-it-Later item.
                (Requires more disk space).
            </p>
        </div>

        <button style="width: 100%; padding: 12px; font-weight: bold">
            Save All Changes
        </button>
    </div>
</div>
{{end}}
