{{define "content"}}
<div class="centered-view">
    <h2>RSS Feeds</h2>
    <div style="display: flex; gap: 10px; margin-bottom: 30px">
        <input
            type="text"
            placeholder="https://..."
            style="
                flex-grow: 1;
                margin: 0;
                background: var(--bg-color);
                color: var(--text-main);
                border: 1px solid var(--border-color);
            "
        />
        <button style="margin: 0">Add Feed</button>
    </div>

    <div class="list-item">
        <div>
            <h4><a href="#">Show HN: y-py - Yjs CRDT binding</a></h4>
            <small class="text-muted">news.ycombinator.com (5m ago)</small>
        </div>
        <button class="outline" hx-post="/api/save" hx-swap="outerHTML">
            Read It Later
        </button>
    </div>
</div>
{{end}}
