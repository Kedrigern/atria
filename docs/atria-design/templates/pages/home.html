{{define "content"}}
<div class="centered-view">
    <h2>Dashboard</h2>
    <div
        style="
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        "
    >
        <div
            style="
                border: 1px solid var(--border-color);
                padding: 20px;
                border-radius: 6px;
                background: var(--pane-bg);
            "
        >
            <h4 style="margin-top: 0; color: var(--accent)">📡 RSS Triage</h4>
            <p>Unread items: <strong>{{.UnreadCount}}</strong></p>
            <a href="/rss">Go to unread →</a>
        </div>
        <div
            style="
                border: 1px solid var(--border-color);
                padding: 20px;
                border-radius: 6px;
                background: var(--pane-bg);
            "
        >
            <h4 style="margin-top: 0; color: var(--accent)">
                📑 Read-it-Later
            </h4>
            <p>Items in Inbox: <strong>8</strong></p>
            <a href="/read">Start reading →</a>
        </div>
    </div>
</div>
{{end}}
